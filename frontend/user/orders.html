<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | ShopEasy</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .modal-content h3 {
      margin-bottom: 20px;
      color: #1a1a2e;
    }

    .modal-content textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-family: Arial;
      margin-bottom: 15px;
      resize: vertical;
      min-height: 80px;
    }

    .modal-content textarea:focus {
      outline: none;
      border-color: #f0a500;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-buttons button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .modal-buttons .cancel-btn {
      background: #999;
      color: white;
    }

    .modal-buttons .cancel-btn:hover {
      background: #777;
    }

    .modal-buttons .confirm-btn {
      background: #f0a500;
      color: white;
    }

    .modal-buttons .confirm-btn:hover {
      background: #e09400;
    }

    .order-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .order-actions button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-size: 0.9rem;
    }

    .order-actions .cancel-order-btn {
      background: #e74c3c;
      color: white;
    }

    .order-actions .cancel-order-btn:hover:not(:disabled) {
      background: #c0392b;
    }

    .order-actions .cancel-order-btn:disabled {
      background: #999;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .order-actions .update-address-btn {
      background: #3498db;
      color: white;
    }

    .order-actions .update-address-btn:hover:not(:disabled) {
      background: #2980b9;
    }

    .order-actions .update-address-btn:disabled {
      background: #999;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .status-message {
      font-size: 0.85rem;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <nav>
    <h1>🛒 ShopEasy</h1>
    <div class="nav-links">
      <a href="../index.html">🏠 Home</a>
      <a href="dashboard.html">My Account</a>
      <a href="cart.html" class="cart-btn">🛒 Cart <span id="cartCount">0</span></a>
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </nav>

  <div class="orders-container">
    <h2 style="margin-bottom:20px">📦 All My Orders</h2>
    <div id="ordersList">
      <div class="loading"><div class="spinner"></div>Loading orders...</div>
    </div>
  </div>

  <!-- Modals -->
  <div id="updateAddressModal" class="modal">
    <div class="modal-content">
      <h3>📍 Update Address</h3>
      <textarea id="newAddress" placeholder="Enter your new address..."></textarea>
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeModal('updateAddressModal')">❌ Cancel</button>
        <button class="confirm-btn" onclick="confirmUpdateAddress()">✅ Update Address</button>
      </div>
    </div>
  </div>

  <div id="cancelOrderModal" class="modal">
    <div class="modal-content">
      <h3>⚠️ Cancel Order</h3>
      <p style="color: #666; margin-bottom: 15px;">Are you sure you want to cancel this order?</p>
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeModal('cancelOrderModal')">❌ No</button>
        <button class="confirm-btn" onclick="confirmCancelOrder()">✅ Yes, Cancel Order</button>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '../login.html';

    updateCartCount();

    let selectedOrderId = null;

    async function loadOrders() {
      try {
        const res = await fetch(`${API}/orders/my`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const orders = await res.json();
        const div = document.getElementById('ordersList');

        if (orders.length === 0) {
          div.innerHTML = `
            <div class="empty-cart">
              <div class="empty-icon">📦</div>
              <h3>No Orders Found!</h3>
              <br>
              <a href="../index.html" class="btn btn-primary">🛍️ Start Shopping</a>
            </div>
          `;
          return;
        }

        div.innerHTML = orders.map(o => {
          const canCancel = o.status === 'pending' || o.status === 'processing';
          const canUpdateAddress = o.status === 'pending' || o.status === 'processing';
          
          return `
            <div class="order-card">
              <div class="order-header">
                <div>
                  <span class="order-id">Order #${o._id.slice(-6).toUpperCase()}</span>
                  <br>
                  <small style="color:#777">${new Date(o.createdAt).toLocaleString('hi-IN')}</small>
                </div>
                <span class="status-badge status-${o.status}">${o.status.toUpperCase()}</span>
              </div>

              ${o.items.map(item => `
                <div class="order-item">
                  <img src="${item.productId && item.productId.images && item.productId.images[0]
                    ? item.productId.images[0]
                    : 'https://via.placeholder.com/55'}" alt="product">
                  <div>
                    <strong>${item.productId ? item.productId.name : 'Product'}</strong>
                    <br>
                    <small>Qty: ${item.quantity} × ₹${item.price.toLocaleString()}</small>
                  </div>
                </div>
              `).join('')}

              <div class="order-footer">
                <span>📍 ${o.address}</span>
                <span class="order-total">₹${o.totalAmount.toLocaleString()}</span>
              </div>

              <div class="order-actions">
                <button class="update-address-btn ${!canUpdateAddress ? 'disabled' : ''}" 
                  onclick="openUpdateAddressModal('${o._id}')"
                  ${!canUpdateAddress ? 'disabled' : ''}
                  title="${canUpdateAddress ? 'Update address' : 'Only pending/processing orders can have address updated!'}">
                  📝 Address Update
                </button>
                <button class="cancel-order-btn ${!canCancel ? 'disabled' : ''}" 
                  onclick="openCancelOrderModal('${o._id}')"
                  ${!canCancel ? 'disabled' : ''}
                  title="${canCancel ? 'Cancel order' : 'Shipped orders cannot be cancelled!'}">
                  ❌ Cancel Order
                </button>
              </div>
              ${!canCancel && o.status === 'shipped' ? `
                <div class="status-message">
                  📦 Order has been shipped and cannot be cancelled
                </div>
              ` : ''}
            </div>
          `;
        }).join('');

      } catch (err) {
        document.getElementById('ordersList').innerHTML = '<p>Failed to load orders!</p>';
      }
    }

    function openUpdateAddressModal(orderId) {
      selectedOrderId = orderId;
      document.getElementById('newAddress').value = '';
      document.getElementById('updateAddressModal').classList.add('active');
    }

    function openCancelOrderModal(orderId) {
      selectedOrderId = orderId;
      document.getElementById('cancelOrderModal').classList.add('active');
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
      selectedOrderId = null;
    }

    async function confirmUpdateAddress() {
      const newAddress = document.getElementById('newAddress').value.trim();
      
      if (!newAddress) {
        showToast('Address cannot be blank!', 'error');
        return;
      }

      if (newAddress.length < 10) {
        showToast('Address properly likho (kam se kam 10 characters)', 'error');
        return;
      }

      try {
        const res = await fetch(`${API}/orders/update-address/${selectedOrderId}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ address: newAddress })
        });

        const data = await res.json();

        if (res.ok) {
          showToast('✅ ' + data.message);
          closeModal('updateAddressModal');
          loadOrders();
        } else {
          showToast('❌ ' + data.message, 'error');
        }
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function confirmCancelOrder() {
      try {
        const res = await fetch(`${API}/orders/cancel/${selectedOrderId}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        const data = await res.json();

        if (res.ok) {
          showToast('✅ ' + data.message);
          closeModal('cancelOrderModal');
          loadOrders();
        } else {
          showToast('❌ ' + data.message, 'error');
        }
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    // Close modal when clicking outside
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) {
        e.target.classList.remove('active');
        selectedOrderId = null;
      }
    });

    loadOrders();
  </script>
</body>
</html>
