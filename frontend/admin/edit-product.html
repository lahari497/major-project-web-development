<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product | Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav>
    <h1>⚙️ Admin Panel</h1>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="../index.html">🏠 Home</a>
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </nav>

  <div class="form-container">
    <h2>🖊️ Update Product</h2>

    <div class="form-group">
      <label>Product Name *</label>
      <input type="text" id="pName" placeholder="e.g., iPhone 15, Nike Shoes...">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="pDesc" placeholder="Write a description for the product..."></textarea>
    </div>

    <div class="form-group">
      <label>Price (₹) *</label>
      <input type="number" id="pPrice" placeholder="e.g., 999" min="0">
    </div>

    <div class="form-group">
      <label>Stock Quantity *</label>
      <input type="number" id="pStock" placeholder="e.g., 50" min="0">
    </div>

    <div class="form-group">
      <label>Category</label>
      <input type="text" id="pCategory" placeholder="e.g., Electronics, Clothing, Food...">
    </div>

    <div class="form-group">
      <label>📸 Existing Images</label>
      <div class="image-preview" id="imagePreview"></div>
    </div>

    <button class="btn btn-primary" id="addProductBtn" style="width:100%;padding:14px;font-size:1rem">
      🖊️ Update Product
    </button>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    // Admin check
    if (!localStorage.getItem('token') || localStorage.getItem('role') !== 'admin') {
      window.location.href = '../login.html';
    }

    updateCartCount();
    loadProductForEdit();
  </script>
</body>
</html>
